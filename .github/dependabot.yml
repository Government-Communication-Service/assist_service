version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    target-branch: "dev-main"
    labels:
      - patch
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    target-branch: "dev-main"
    labels:
      - dependencies
      - docker
    groups:
      docker:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
    target-branch: "dev-main"
    labels:
      - dependencies
      - python
    ignore:
      # Held at 0.18.18: 0.22.x regressed PDF parsing (OCR fallback needing Tesseract we don't
      # ship). See requirements.txt. Re-test PDF uploads before unignoring/bumping.
      - dependency-name: "unstructured"
      # Kept in lockstep with unstructured 0.18.18 (pinned to its tested 1.0.5); bump together.
      - dependency-name: "unstructured-inference"
    groups:
      python-production:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      python-development:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
